<!DOCTYPE html>

                        "on-error": "#690005",

        body {
            background-color: #0F1419;
            color: #dee3ea;
        }
        .glass-card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #2D3748;
        }
        .input-glow:focus {
            box-shadow: 0 0 8px rgba(14, 205, 196, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md md:p-lg bg-background relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="w-full max-w-[480px] glass-card rounded-xl p-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] relative z-10 transition-transform duration-300 hover:scale-[1.01] hover:border-[#A0AEC0]">
<!-- Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">Foresight</h1>
<h2 class="font-headline-md text-headline-md text-on-surface">Create your account</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Join the predictive intelligence platform.</p>
</div>
<!-- Form -->
<form class="space-y-lg">
<div class="space-y-md">
<!-- Full Name -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface-variant mb-xs" for="fullName">Full name</label>
<input class="w-full bg-[#1A1F3A] border border-outline rounded-lg px-md py-sm font-body-md text-body-md text-[#E0E7FF] placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-0 input-glow transition-colors" id="fullName" name="fullName" placeholder="Jane Doe" type="text"/>
</div>
<!-- Email -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface-variant mb-xs" for="email">Email</label>
<input class="w-full bg-[#1A1F3A] border border-outline rounded-lg px-md py-sm font-body-md text-body-md text-[#E0E7FF] placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-0 input-glow transition-colors" id="email" name="email" placeholder="jane@example.com" type="email"/>
</div>
<!-- Password -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface-variant mb-xs" for="password">Password</label>
<input class="w-full bg-[#1A1F3A] border border-outline rounded-lg px-md py-sm font-body-md text-body-md text-[#E0E7FF] placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-0 input-glow transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface-variant mb-xs" for="confirmPassword">Confirm password</label>
<input class="w-full bg-[#1A1F3A] border border-outline rounded-lg px-md py-sm font-body-md text-body-md text-[#E0E7FF] placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-0 input-glow transition-colors" id="confirmPassword" name="confirmPassword" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm">
<div class="flex items-center h-5">
<input class="w-4 h-4 bg-[#1A1F3A] border-outline rounded text-primary focus:ring-primary focus:ring-offset-0 focus:ring-offset-[#1A1F3A]" id="terms" name="terms" type="checkbox"/>
</div>
<div class="text-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</label>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-[#0ECDC4] text-[#0F1419] font-headline-sm text-headline-sm py-sm px-lg rounded-lg hover:scale-[1.02] hover:brightness-110 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm" type="submit">
                Create Account
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-md">
<div class="flex-grow border-t border-outline"></div>
<span class="flex-shrink-0 mx-md text-on-surface-variant font-label-caps text-label-caps">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline"></div>
</div>
<!-- Social Actions -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm bg-transparent border border-outline rounded-lg py-sm px-md text-[#E0E7FF] font-body-sm text-body-sm hover:scale-[1.02] hover:bg-surface-variant hover:border-[#A0AEC0] active:scale-[0.98] transition-all duration-200" type="button">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpnavtCuM37pwVAabBa5wYJc-DFyCii9ODQZKv_GvSCAOCg9u5YTRpBmM16Zix_Srs2c95y_1qAI0m0rfqe7qvVyN1ovPSdHH-ZWw5CmUwBqi3pFJ4pKCC5enSRW5oDt0AFLnlG64EojaA0pSAz166EUQZZbjvWkMqpj10dQmZxviIu820-O_svKNu-QG9oTZ8jGKjyjqaymkEzttzLQ8C_0y2uF33x06LeZvk6YXPSD4Jh6Hq5FAyF2DHBSEeU0use0awlXvwVo4"/>
                    Google
                </button>
<button class="flex items-center justify-center gap-sm bg-transparent border border-outline rounded-lg py-sm px-md text-[#E0E7FF] font-body-sm text-body-sm hover:scale-[1.02] hover:bg-surface-variant hover:border-[#A0AEC0] active:scale-[0.98] transition-all duration-200" type="button">
<img alt="GitHub" class="w-5 h-5 filter invert" src="https://lh3.googleusercontent.com/aida-public/AB6AXuASlQbUsBixh47gLwd6maw-TxSXxIRwffxQe_m1smyQLlTXImzoZp3LSWcgsen3UAUHuti0HQotzHoPNnZkAGvgsaKigGmQmdrDH1k7PVP_J3MoiUmqevHJimaPiyEm7yt6DO8VA2uM76ktjxqBu-8moUPYqq-_nw21QkM8mA78k5n1YXWzX5YgxtHIA0PTSVFGZ5dBYKspucm9u2cunbjYXzUFnyDFjZ6tr8rK9m4u0FrTzrWCA3E1B_bxG9zZPYGPU6KOpdKVFg0"/>
                    GitHub
                </button>
</div>
<!-- Sign In Link -->
<p class="text-center font-body-sm text-body-sm text-on-surface-variant pt-sm">
                Already have an account? 
                <a class="text-primary hover:underline font-semibold transition-colors duration-200" href="#">Sign in</a>
</p>
</form>
</div>
</body></html>
